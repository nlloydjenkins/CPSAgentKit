name: cpsagentkit-mcp-server
metadata:
  template: cpsagentkit-mcp-server
infra:
  provider: bicep
  path: ./infra
services:
  mcp-server:
    project: .
    language: js
    host: appservice
    hooks:
      prepackage:
        posix:
          shell: sh
          run: |
            set -e
            cd ../..
            npm ci
            npm run bundle:mcp
        windows:
          shell: pwsh
          run: |
            Set-Location ../..
            npm ci
            npm run bundle:mcp
