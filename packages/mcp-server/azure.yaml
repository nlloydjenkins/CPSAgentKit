# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: cpsagentkit-mcp-server
metadata:
  template: cpsagentkit-mcp-server@1.0.0
infra:
  provider: bicep
  path: ./infra
  module: main
services:
  mcp-server:
    project: .
    language: ts
    host: containerapp
    docker:
      # Build the image from the monorepo root so the Dockerfile can copy
      # both packages/core/ and packages/mcp-server/ in a single context.
      path: ./Dockerfile
      context: ../..
      remoteBuild: true
