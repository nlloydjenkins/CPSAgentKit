name: Deploy MCP server to Azure Container Apps

# Builds the MCP server container image, pushes it to the project ACR, and
# updates the existing Container App revision. This workflow updates an
# already-provisioned Container Apps stack — it does NOT provision infra.
#
# ── Required GitHub repository secrets (OIDC federated, no client secret) ──
#   AZURE_CLIENT_ID         User-assigned managed identity / app registration
#                           with these RBAC role assignments:
#                             • Resource group `${AZURE_RESOURCE_GROUP}`:
#                                 - "Contributor" (or "Container Apps
#                                   Contributor" on the Container App alone)
#                             • Container Registry `${AZURE_CONTAINER_REGISTRY}`:
#                                 - "AcrPush"
#                           Federated credential must trust this repo +
#                           `refs/heads/main` (and optionally workflow_dispatch).
#   AZURE_TENANT_ID         Entra tenant ID.
#   AZURE_SUBSCRIPTION_ID   Subscription containing the RG.
#
# ── Required GitHub repository variables (Settings → Variables) ───────────
#   AZURE_RESOURCE_GROUP        e.g. rg-cpsagentkit-mcp
#   AZURE_CONTAINER_REGISTRY    e.g. acr6frsoq6bw5vukcps   (name only, no .azurecr.io)
#   AZURE_CONTAINER_APP         e.g. ca-mcp-6frsoq6bw5vuk
#
# ── Image tagging ─────────────────────────────────────────────────────────
# Each run pushes two tags to ACR:
#   <registry>/cpsagentkit-mcp:<git-sha>     ← immutable, used to update the app
#   <registry>/cpsagentkit-mcp:latest        ← convenience, not pinned by the app
# The Container App revision is pinned to the SHA tag so rollbacks are trivial
# (`az containerapp revision set-mode` / `--revision-suffix`).

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp-server/**"
      - "packages/core/**"
      - "docs/knowledge/**"
      - "docs/bestpractices/**"
      - "scripts/copy-shared-assets.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-mcp.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: cpsagentkit-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub variables
        run: |
          : "${AZURE_RESOURCE_GROUP:?repo variable AZURE_RESOURCE_GROUP is required}"
          : "${AZURE_CONTAINER_REGISTRY:?repo variable AZURE_CONTAINER_REGISTRY is required}"
          : "${AZURE_CONTAINER_APP:?repo variable AZURE_CONTAINER_APP is required}"
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP }}

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ vars.AZURE_CONTAINER_REGISTRY }}"

      - name: Build and push image
        id: build
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io"
          SHA_TAG="${GITHUB_SHA}"
          IMAGE_SHA="${REGISTRY}/${IMAGE_NAME}:${SHA_TAG}"
          IMAGE_LATEST="${REGISTRY}/${IMAGE_NAME}:latest"

          docker build \
            -f packages/mcp-server/Dockerfile \
            -t "${IMAGE_SHA}" \
            -t "${IMAGE_LATEST}" \
            .

          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_LATEST}"

          echo "image=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update Container App to new image
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ steps.build.outputs.image }}" \
            --revision-suffix "sha-${GITHUB_SHA:0:7}" \
            --output none

      - name: Show endpoint
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.AZURE_CONTAINER_APP }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "MCP endpoint: https://${FQDN}/mcp"
          echo "::notice title=MCP endpoint::https://${FQDN}/mcp"
